<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Math Fluency — Add &amp; Subtract within 20</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f4ff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #1a1a2e;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 1.5rem;
      color: #3b4cca;
    }

    /* ── Setup screen ─────────────────────────────── */
    #setup {
      background: #fff;
      border-radius: 20px;
      padding: 2rem 2.5rem;
      box-shadow: 0 4px 24px rgba(59,76,202,0.12);
      width: min(380px, 92vw);
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    #setup label {
      font-weight: 600;
      font-size: 0.95rem;
      display: block;
      margin-bottom: 0.4rem;
      color: #444;
    }

    .option-row {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    .pill {
      cursor: pointer;
      padding: 0.45rem 1rem;
      border: 2px solid #d0d6f5;
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 600;
      background: #fff;
      color: #555;
      transition: all 0.15s;
      user-select: none;
    }
    .pill:hover { border-color: #3b4cca; color: #3b4cca; }
    .pill.active { background: #3b4cca; border-color: #3b4cca; color: #fff; }

    #start-btn {
      margin-top: 0.5rem;
      padding: 0.75rem;
      background: #3b4cca;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    #start-btn:hover { background: #2d3ba8; }
    #start-btn:active { transform: scale(0.97); }

    /* ── Game screen ──────────────────────────────── */
    #game {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
      width: min(440px, 92vw);
    }

    .hud {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.9rem;
      font-weight: 600;
      color: #555;
    }

    .hud-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .hud-val { font-size: 1.4rem; font-weight: 800; color: #3b4cca; }
    #timer-val { color: #e05252; }

    /* progress bar */
    #progress-wrap {
      width: 100%;
      height: 8px;
      background: #dde1f7;
      border-radius: 999px;
      overflow: hidden;
    }
    #progress-bar {
      height: 100%;
      background: #3b4cca;
      border-radius: 999px;
      transition: width 0.3s;
      width: 0%;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(59,76,202,0.12);
      padding: 2.5rem 2rem;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.4rem;
    }

    #problem {
      font-size: 3.2rem;
      font-weight: 800;
      letter-spacing: -1px;
      color: #1a1a2e;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    #answer-input {
      width: 120px;
      text-align: center;
      font-size: 2.4rem;
      font-weight: 700;
      border: 3px solid #d0d6f5;
      border-radius: 14px;
      padding: 0.3rem 0.6rem;
      outline: none;
      transition: border-color 0.15s;
      color: #1a1a2e;
      background: #f8f9ff;
    }
    #answer-input:focus { border-color: #3b4cca; background: #fff; }
    #answer-input.correct { border-color: #22c55e; background: #f0fdf4; animation: pop 0.25s ease; }
    #answer-input.wrong   { border-color: #ef4444; background: #fff5f5; animation: shake 0.35s ease; }

    @keyframes pop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-8px); }
      40%       { transform: translateX(8px); }
      60%       { transform: translateX(-6px); }
      80%       { transform: translateX(6px); }
    }

    #feedback {
      font-size: 1.1rem;
      font-weight: 700;
      min-height: 1.4rem;
    }
    #feedback.correct { color: #16a34a; }
    #feedback.wrong   { color: #dc2626; }

    #submit-btn {
      padding: 0.6rem 2rem;
      background: #3b4cca;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }
    #submit-btn:hover { background: #2d3ba8; }

    /* ── Results screen ───────────────────────────── */
    #results {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
      width: min(400px, 92vw);
    }

    .results-card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(59,76,202,0.12);
      padding: 2rem 2.5rem;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .big-score {
      font-size: 4rem;
      font-weight: 900;
      color: #3b4cca;
      line-height: 1;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
      width: 100%;
      margin-top: 0.5rem;
    }

    .stat-box {
      background: #f0f4ff;
      border-radius: 12px;
      padding: 0.8rem;
      text-align: center;
    }
    .stat-label { font-size: 0.75rem; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-num   { font-size: 1.5rem; font-weight: 800; color: #1a1a2e; }

    .result-actions {
      display: flex;
      gap: 0.8rem;
      width: 100%;
    }

    .btn-secondary {
      flex: 1;
      padding: 0.65rem;
      border: 2px solid #3b4cca;
      background: #fff;
      color: #3b4cca;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-secondary:hover { background: #f0f4ff; }

    .btn-primary {
      flex: 1;
      padding: 0.65rem;
      background: #3b4cca;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: #2d3ba8; }

    .medal { font-size: 2.5rem; }

    /* ── Responsive ───────────────────────────────── */
    @media (max-width: 400px) {
      #problem { font-size: 2.4rem; }
      #answer-input { font-size: 2rem; width: 100px; }
    }
  </style>
</head>
<body>

<!-- SETUP -->
<div id="setup">
  <h1 style="text-align:center; margin-bottom:0;">Math Fluency</h1>
  <p style="text-align:center; color:#888; font-size:0.9rem;">Addition &amp; Subtraction within 20</p>

  <div>
    <label>Operation</label>
    <div class="option-row">
      <span class="pill active" data-group="op" data-val="both">+ and −</span>
      <span class="pill" data-group="op" data-val="add">+ only</span>
      <span class="pill" data-group="op" data-val="sub">− only</span>
    </div>
  </div>

  <div>
    <label>Mode</label>
    <div class="option-row">
      <span class="pill active" data-group="mode" data-val="timed">Timed (60 s)</span>
      <span class="pill" data-group="mode" data-val="count">20 Questions</span>
    </div>
  </div>

  <button id="start-btn">Start!</button>
</div>

<!-- GAME -->
<div id="game">
  <h1>Math Fluency</h1>
  <div class="hud">
    <div class="hud-item"><span class="hud-label">Score</span><span class="hud-val" id="score-val">0</span></div>
    <div class="hud-item"><span class="hud-label" id="timer-label">Time</span><span class="hud-val" id="timer-val">60</span></div>
    <div class="hud-item"><span class="hud-label">Streak</span><span class="hud-val" id="streak-val">0</span></div>
  </div>
  <div id="progress-wrap"><div id="progress-bar"></div></div>
  <div class="card">
    <div id="problem"></div>
    <input id="answer-input" type="number" inputmode="numeric" min="0" max="20" autocomplete="off" placeholder="?">
    <div id="feedback"></div>
    <button id="submit-btn">Check</button>
  </div>
</div>

<!-- RESULTS -->
<div id="results">
  <h1>Results</h1>
  <div class="results-card">
    <div class="medal" id="medal">🏅</div>
    <div class="big-score" id="final-score">0</div>
    <div style="color:#888; font-size:0.9rem;">points</div>
    <div class="stat-grid">
      <div class="stat-box"><div class="stat-label">Correct</div><div class="stat-num" id="res-correct">0</div></div>
      <div class="stat-box"><div class="stat-label">Wrong</div><div class="stat-num" id="res-wrong">0</div></div>
      <div class="stat-box"><div class="stat-label">Accuracy</div><div class="stat-num" id="res-acc">0%</div></div>
      <div class="stat-box"><div class="stat-label">Best Streak</div><div class="stat-num" id="res-streak">0</div></div>
    </div>
  </div>
  <div class="result-actions">
    <button class="btn-secondary" id="change-btn">Change Settings</button>
    <button class="btn-primary" id="again-btn">Play Again</button>
  </div>
</div>

<script>
  // ── State ────────────────────────────────────────
  const cfg = { op: 'both', mode: 'timed' };
  let score, correct, wrong, streak, bestStreak;
  let questionCount, totalQuestions;
  let timerSec, timerId;
  let currentAnswer;
  let locked; // prevent double-submit during feedback flash

  // ── DOM refs ─────────────────────────────────────
  const setupEl   = document.getElementById('setup');
  const gameEl    = document.getElementById('game');
  const resultsEl = document.getElementById('results');

  const scoreVal  = document.getElementById('score-val');
  const timerVal  = document.getElementById('timer-val');
  const streakVal = document.getElementById('streak-val');
  const timerLabel = document.getElementById('timer-label');
  const progressBar = document.getElementById('progress-bar');

  const problemEl = document.getElementById('problem');
  const answerInput = document.getElementById('answer-input');
  const feedbackEl = document.getElementById('feedback');
  const submitBtn  = document.getElementById('submit-btn');

  // ── Pill selection ───────────────────────────────
  document.querySelectorAll('.pill').forEach(pill => {
    pill.addEventListener('click', () => {
      const group = pill.dataset.group;
      document.querySelectorAll(`.pill[data-group="${group}"]`).forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      cfg[group] = pill.dataset.val;
    });
  });

  // ── Start ────────────────────────────────────────
  document.getElementById('start-btn').addEventListener('click', startGame);
  document.getElementById('again-btn').addEventListener('click', startGame);
  document.getElementById('change-btn').addEventListener('click', () => {
    resultsEl.style.display = 'none';
    setupEl.style.display   = 'flex';
  });

  function startGame() {
    score = correct = wrong = streak = bestStreak = questionCount = 0;
    totalQuestions = cfg.mode === 'count' ? 20 : Infinity;
    timerSec = 60;
    locked = false;

    setupEl.style.display   = 'none';
    resultsEl.style.display = 'none';
    gameEl.style.display    = 'flex';

    updateHUD();
    if (cfg.mode === 'timed') {
      timerLabel.textContent = 'Time';
      timerVal.textContent   = timerSec;
      progressBar.style.width = '0%';
      timerId = setInterval(tick, 1000);
    } else {
      timerLabel.textContent = 'Left';
      timerVal.textContent   = totalQuestions;
      progressBar.style.width = '0%';
    }

    nextQuestion();
    answerInput.focus();
  }

  function tick() {
    timerSec--;
    timerVal.textContent = timerSec;
    if (timerSec <= 0) endGame();
  }

  // ── Question generation ──────────────────────────
  function nextQuestion() {
    feedbackEl.textContent = '';
    feedbackEl.className   = '';
    answerInput.value      = '';
    answerInput.className  = '';
    locked = false;

    const useAdd = cfg.op === 'add' || (cfg.op === 'both' && Math.random() < 0.5);

    let a, b;
    if (useAdd) {
      a = randInt(0, 20);
      b = randInt(0, 20 - a);
      currentAnswer = a + b;
      problemEl.innerHTML = `${a} <span style="color:#3b4cca">+</span> ${b} =`;
    } else {
      a = randInt(0, 20);
      b = randInt(0, a);
      currentAnswer = a - b;
      problemEl.innerHTML = `${a} <span style="color:#e05252">−</span> ${b} =`;
    }

    if (cfg.mode === 'count') {
      timerVal.textContent = totalQuestions - questionCount;
      progressBar.style.width = (questionCount / totalQuestions * 100) + '%';
    }
  }

  function randInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  // ── Submit ───────────────────────────────────────
  function submit() {
    if (locked) return;
    const val = answerInput.value.trim();
    if (val === '') return;

    locked = true;
    const userAns = parseInt(val, 10);

    if (userAns === currentAnswer) {
      correct++;
      streak++;
      if (streak > bestStreak) bestStreak = streak;
      score += 10 + (streak > 1 ? (streak - 1) * 2 : 0); // streak bonus
      answerInput.classList.add('correct');
      feedbackEl.textContent = streak >= 3 ? `+${10 + (streak-1)*2} 🔥 Streak x${streak}!` : 'Correct!';
      feedbackEl.className   = 'correct';
    } else {
      wrong++;
      streak = 0;
      answerInput.classList.add('wrong');
      feedbackEl.textContent = `Not quite — answer was ${currentAnswer}`;
      feedbackEl.className   = 'wrong';
    }

    questionCount++;
    updateHUD();

    if (cfg.mode === 'count' && questionCount >= totalQuestions) {
      setTimeout(endGame, 700);
      return;
    }

    setTimeout(nextQuestion, 700);
    setTimeout(() => answerInput.focus(), 710);
  }

  submitBtn.addEventListener('click', submit);
  answerInput.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });

  function updateHUD() {
    scoreVal.textContent  = score;
    streakVal.textContent = streak;
  }

  // ── End game ─────────────────────────────────────
  function endGame() {
    clearInterval(timerId);
    gameEl.style.display    = 'none';
    resultsEl.style.display = 'flex';

    const total = correct + wrong;
    const acc   = total ? Math.round(correct / total * 100) : 0;

    document.getElementById('final-score').textContent  = score;
    document.getElementById('res-correct').textContent  = correct;
    document.getElementById('res-wrong').textContent    = wrong;
    document.getElementById('res-acc').textContent      = acc + '%';
    document.getElementById('res-streak').textContent   = bestStreak;

    const medal = document.getElementById('medal');
    if (acc === 100)     medal.textContent = '🥇';
    else if (acc >= 80)  medal.textContent = '🥈';
    else if (acc >= 60)  medal.textContent = '🥉';
    else                 medal.textContent = '💪';
  }
</script>
</body>
</html>
